<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIRA – Sistema de Recomendaciones Académicas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #21262d;
      --accent: #58a6ff;
      --accent2: #3fb950;
      --danger: #f85149;
      --warn: #d29922;
      --text: #e6edf3;
      --muted: #8b949e;
      --card: #1c2128;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ───── NAV ───── */
    nav {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 56px; position: sticky; top: 0; z-index: 100;
    }
    nav .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--accent); margin-right: 16px; }
    nav button {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; padding: 6px 14px;
      border-radius: 6px; transition: all .2s;
    }
    nav button:hover, nav button.active { background: var(--border); color: var(--text); }
    nav .spacer { flex: 1; }
    nav .user-chip { background: var(--border); border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; color: var(--accent); }

    /* ───── PAGES ───── */
    .page { display: none; padding: 32px 24px; max-width: 900px; margin: 0 auto; }
    .page.active { display: block; }

    /* ───── LOGIN ───── */
    #page-login { max-width: 400px; margin: 60px auto; }
    .login-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 40px 36px; text-align: center;
    }
    .login-card h1 { font-family: 'Syne', sans-serif; font-size: 2rem; color: var(--accent); }
    .login-card p { color: var(--muted); margin: 6px 0 28px; font-size: 0.9rem; }

    /* ───── FORMS ───── */
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; text-align: left; }
    .field label { font-size: 0.82rem; color: var(--muted); font-weight: 500; }
    .field input, .field select {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      border-radius: var(--radius); padding: 10px 14px; font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .2s;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }

    /* ───── BUTTONS ───── */
    .btn { display: inline-flex; align-items: center; gap: 6px; border: none; border-radius: var(--radius); padding: 10px 18px; font-size: 0.88rem; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all .18s; }
    .btn-primary  { background: var(--accent); color: #0d1117; }
    .btn-primary:hover  { filter: brightness(1.15); }
    .btn-success  { background: var(--accent2); color: #0d1117; }
    .btn-success:hover  { filter: brightness(1.15); }
    .btn-danger   { background: var(--danger); color: #fff; }
    .btn-danger:hover   { filter: brightness(1.15); }
    .btn-ghost    { background: var(--border); color: var(--text); }
    .btn-ghost:hover    { background: #2d333b; }
    .btn-full { width: 100%; justify-content: center; }

    /* ───── SECTION HEADER ───── */
    .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-head h2 { font-family: 'Syne', sans-serif; font-size: 1.4rem; }

    /* ───── TABLE ───── */
    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead th { background: var(--surface); color: var(--muted); text-align: left; padding: 12px 16px; font-weight: 500; border-bottom: 1px solid var(--border); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--card); }
    tbody td { padding: 12px 16px; }
    .actions { display: flex; gap: 6px; }

    /* ───── MODAL ───── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65);
      z-index: 200; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 32px; width: 90%; max-width: 460px;
    }
    .modal h3 { font-family: 'Syne', sans-serif; margin-bottom: 20px; }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    /* ───── TOAST ───── */
    #toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 999;
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px 20px; font-size: 0.88rem; opacity: 0;
      transition: opacity .3s; pointer-events: none;
    }
    #toast.show { opacity: 1; }
    #toast.ok   { border-color: var(--accent2); color: var(--accent2); }
    #toast.err  { border-color: var(--danger); color: var(--danger); }

    /* ───── BADGE ───── */
    .badge { display: inline-block; border-radius: 20px; padding: 2px 10px; font-size: 0.78rem; font-weight: 600; }
    .badge-ok   { background: #1a3a2a; color: var(--accent2); }
    .badge-warn { background: #2d2208; color: var(--warn); }
    .badge-err  { background: #3a1a1a; color: var(--danger); }

    .empty { text-align: center; color: var(--muted); padding: 40px; }
  </style>
</head>
<body>

<!-- NAV -->
<nav id="navbar" style="display:none;">
  <span class="logo">SIRA</span>
  <button class="nav-btn active" data-page="estudiantes">Estudiantes</button>
  <button class="nav-btn" data-page="materias">Materias</button>
  <button class="nav-btn" data-page="calificaciones">Calificaciones</button>
  <button class="nav-btn" data-page="carreras">Carreras</button>
  <div class="spacer"></div>
  <span class="user-chip" id="user-label">—</span>
  <button class="btn btn-ghost" style="margin-left:8px;" onclick="logout()">Salir</button>
</nav>

<!-- TOAST -->
<div id="toast"></div>

<!-- ══════════ PAGE: LOGIN ══════════ -->
<div class="page active" id="page-login">
  <div class="login-card">
    <h1>SIRA</h1>
    <p>Sistema de Recomendaciones Académicas</p>
    <div class="field"><label>Correo</label><input type="email" id="login-correo" placeholder="correo@ejemplo.com" /></div>
    <div class="field"><label>Contraseña</label><input type="password" id="login-pass" placeholder="••••••••" /></div>
    <button class="btn btn-primary btn-full" style="margin-top:8px;" onclick="doLogin()">Iniciar sesión</button>
  </div>
</div>

<!-- ══════════ PAGE: ESTUDIANTES ══════════ -->
<div class="page" id="page-estudiantes">
  <div class="section-head">
    <h2>👩‍🎓 Estudiantes</h2>
    <button class="btn btn-success" onclick="openModal('est', null)">+ Agregar</button>
  </div>
  <div class="table-wrap">
    <table id="tbl-estudiantes">
      <thead><tr><th>#</th><th>Nombre</th><th>Correo</th><th>Carrera</th><th>Acciones</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- ══════════ PAGE: MATERIAS ══════════ -->
<div class="page" id="page-materias">
  <div class="section-head">
    <h2>📚 Materias</h2>
    <button class="btn btn-success" onclick="openModal('mat', null)">+ Agregar</button>
  </div>
  <div class="table-wrap">
    <table id="tbl-materias">
      <thead><tr><th>#</th><th>Nombre</th><th>Descripción</th><th>Acciones</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- ══════════ PAGE: CALIFICACIONES ══════════ -->
<div class="page" id="page-calificaciones">
  <div class="section-head">
    <h2>📊 Calificaciones</h2>
    <button class="btn btn-success" onclick="openModal('cal', null)">+ Agregar</button>
  </div>
  <div class="table-wrap">
    <table id="tbl-calificaciones">
      <thead><tr><th>#</th><th>Estudiante</th><th>Materia</th><th>P1</th><th>P2</th><th>P3</th><th>Promedio</th><th>Acciones</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- ══════════ PAGE: CARRERAS ══════════ -->
<div class="page" id="page-carreras">
  <div class="section-head">
    <h2>🎓 Carreras</h2>
    <button class="btn btn-success" onclick="openModal('car', null)">+ Agregar</button>
  </div>
  <div class="table-wrap">
    <table id="tbl-carreras">
      <thead><tr><th>#</th><th>Nombre</th><th>Descripción</th><th>Acciones</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- ══════════ MODAL ══════════ -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h3 id="modal-title">Formulario</h3>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="modal-save" onclick="saveModal()">Guardar</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────
// Cambia esto a tu URL de Render cuando lo despliegues
const API = "http://localhost:8000/api";

let currentUser = null;
let modalType = null;
let editId = null;
let carrerasCache = [];

// ─── TOAST ────────────────────────────────────────────────────
function toast(msg, type = "ok") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `show ${type}`;
  setTimeout(() => t.className = "", 2800);
}

// ─── FETCH HELPERS ────────────────────────────────────────────
async function api(path, method = "GET", body = null) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(API + path, opts);
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || "Error");
    return data;
  } catch (e) { throw e; }
}

// ─── AUTH ─────────────────────────────────────────────────────
async function doLogin() {
  const correo = document.getElementById("login-correo").value.trim();
  const pass   = document.getElementById("login-pass").value;
  if (!correo || !pass) { toast("Completa los campos", "err"); return; }
  try {
    const r = await api("/estudiantes/login", "POST", { correo, contrasena: pass });
    currentUser = r.estudiante;
    document.getElementById("user-label").textContent = currentUser.nombre;
    document.getElementById("navbar").style.display = "flex";
    showPage("estudiantes");
  } catch(e) { toast(e.message, "err"); }
}

function logout() {
  currentUser = null;
  document.getElementById("navbar").style.display = "none";
  showPage("login");
}

// ─── NAVIGATION ───────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("page-" + name).classList.add("active");
  const btn = document.querySelector(`.nav-btn[data-page="${name}"]`);
  if (btn) btn.classList.add("active");
  if (name === "estudiantes")    loadEstudiantes();
  if (name === "materias")       loadMaterias();
  if (name === "calificaciones") loadCalificaciones();
  if (name === "carreras")       loadCarreras();
}

document.querySelectorAll(".nav-btn").forEach(btn => {
  btn.addEventListener("click", () => showPage(btn.dataset.page));
});

// ─── ESTUDIANTES ──────────────────────────────────────────────
async function loadEstudiantes() {
  const tbody = document.querySelector("#tbl-estudiantes tbody");
  tbody.innerHTML = `<tr><td colspan="5" class="empty">Cargando…</td></tr>`;
  try {
    const data = await api("/estudiantes/");
    if (!data.length) { tbody.innerHTML = `<tr><td colspan="5" class="empty">Sin registros</td></tr>`; return; }
    tbody.innerHTML = data.map(e => `
      <tr>
        <td>${e.estudiante_id}</td>
        <td>${e.nombre}</td>
        <td>${e.correo}</td>
        <td>${e.carrera || '—'}</td>
        <td class="actions">
          <button class="btn btn-ghost" onclick='openModal("est", ${JSON.stringify(e)})'>✏️</button>
          <button class="btn btn-danger" onclick="deleteItem('estudiantes', ${e.estudiante_id}, loadEstudiantes)">🗑</button>
        </td>
      </tr>`).join("");
  } catch(e) { tbody.innerHTML = `<tr><td colspan="5" class="empty">Error al cargar</td></tr>`; }
}

// ─── MATERIAS ─────────────────────────────────────────────────
async function loadMaterias() {
  const tbody = document.querySelector("#tbl-materias tbody");
  tbody.innerHTML = `<tr><td colspan="4" class="empty">Cargando…</td></tr>`;
  try {
    const data = await api("/materias/");
    if (!data.length) { tbody.innerHTML = `<tr><td colspan="4" class="empty">Sin registros</td></tr>`; return; }
    tbody.innerHTML = data.map(m => `
      <tr>
        <td>${m.materia_id}</td>
        <td>${m.nombre}</td>
        <td>${m.descripcion || '—'}</td>
        <td class="actions">
          <button class="btn btn-ghost" onclick='openModal("mat", ${JSON.stringify(m)})'>✏️</button>
          <button class="btn btn-danger" onclick="deleteItem('materias', ${m.materia_id}, loadMaterias)">🗑</button>
        </td>
      </tr>`).join("");
  } catch(e) { tbody.innerHTML = `<tr><td colspan="4" class="empty">Error al cargar</td></tr>`; }
}

// ─── CALIFICACIONES ───────────────────────────────────────────
async function loadCalificaciones() {
  const tbody = document.querySelector("#tbl-calificaciones tbody");
  tbody.innerHTML = `<tr><td colspan="8" class="empty">Cargando…</td></tr>`;
  try {
    const data = await api("/calificaciones/");
    if (!data.length) { tbody.innerHTML = `<tr><td colspan="8" class="empty">Sin registros</td></tr>`; return; }
    tbody.innerHTML = data.map(c => {
      const prom = parseFloat(c.promedio);
      const badge = prom >= 8 ? "badge-ok" : prom >= 6 ? "badge-warn" : "badge-err";
      return `<tr>
        <td>${c.calificacion_id}</td>
        <td>${c.estudiante || '—'}</td>
        <td>${c.materia || '—'}</td>
        <td>${c.parcial1}</td>
        <td>${c.parcial2}</td>
        <td>${c.parcial3}</td>
        <td><span class="badge ${badge}">${prom.toFixed(1)}</span></td>
        <td class="actions">
          <button class="btn btn-ghost" onclick='openModal("cal", ${JSON.stringify(c)})'>✏️</button>
          <button class="btn btn-danger" onclick="deleteItem('calificaciones', ${c.calificacion_id}, loadCalificaciones)">🗑</button>
        </td>
      </tr>`;
    }).join("");
  } catch(e) { tbody.innerHTML = `<tr><td colspan="8" class="empty">Error al cargar</td></tr>`; }
}

// ─── CARRERAS ─────────────────────────────────────────────────
async function loadCarreras() {
  const tbody = document.querySelector("#tbl-carreras tbody");
  tbody.innerHTML = `<tr><td colspan="4" class="empty">Cargando…</td></tr>`;
  try {
    const data = await api("/carreras/");
    carrerasCache = data;
    if (!data.length) { tbody.innerHTML = `<tr><td colspan="4" class="empty">Sin registros</td></tr>`; return; }
    tbody.innerHTML = data.map(c => `
      <tr>
        <td>${c.carrera_id}</td>
        <td>${c.nombre}</td>
        <td>${c.descripcion || '—'}</td>
        <td class="actions">
          <button class="btn btn-ghost" onclick='openModal("car", ${JSON.stringify(c)})'>✏️</button>
          <button class="btn btn-danger" onclick="deleteItem('carreras', ${c.carrera_id}, loadCarreras)">🗑</button>
        </td>
      </tr>`).join("");
  } catch(e) { tbody.innerHTML = `<tr><td colspan="4" class="empty">Error al cargar</td></tr>`; }
}

// ─── DELETE ───────────────────────────────────────────────────
async function deleteItem(resource, id, reload) {
  if (!confirm("¿Eliminar este registro?")) return;
  try {
    await api(`/${resource}/${id}`, "DELETE");
    toast("Eliminado correctamente");
    reload();
  } catch(e) { toast(e.message, "err"); }
}

// ─── MODAL ────────────────────────────────────────────────────
function openModal(type, item) {
  modalType = type;
  editId = item ? (item.estudiante_id || item.materia_id || item.calificacion_id || item.carrera_id) : null;
  const body = document.getElementById("modal-body");
  const title = document.getElementById("modal-title");

  if (type === "est") {
    title.textContent = item ? "Editar Estudiante" : "Nuevo Estudiante";
    const opts = carrerasCache.map(c => `<option value="${c.carrera_id}" ${item && item.carrera_id === c.carrera_id ? 'selected' : ''}>${c.nombre}</option>`).join("");
    body.innerHTML = `
      <div class="field"><label>Nombre</label><input id="f-nombre" value="${item?.nombre || ''}" /></div>
      <div class="field"><label>Correo</label><input id="f-correo" type="email" value="${item?.correo || ''}" /></div>
      ${!item ? `<div class="field"><label>Contraseña</label><input id="f-pass" type="password" /></div>` : ''}
      <div class="field"><label>Carrera</label><select id="f-carrera">${opts}</select></div>`;
  } else if (type === "mat") {
    title.textContent = item ? "Editar Materia" : "Nueva Materia";
    body.innerHTML = `
      <div class="field"><label>Nombre</label><input id="f-nombre" value="${item?.nombre || ''}" /></div>
      <div class="field"><label>Descripción</label><input id="f-desc" value="${item?.descripcion || ''}" /></div>`;
  } else if (type === "cal") {
    title.textContent = item ? "Editar Calificación" : "Nueva Calificación";
    body.innerHTML = `
      ${!item ? `<div class="field"><label>ID Inscripción</label><input id="f-inscripcion" type="number" /></div>` : ''}
      <div class="field"><label>Parcial 1</label><input id="f-p1" type="number" step="0.01" min="0" max="10" value="${item?.parcial1 || ''}" /></div>
      <div class="field"><label>Parcial 2</label><input id="f-p2" type="number" step="0.01" min="0" max="10" value="${item?.parcial2 || ''}" /></div>
      <div class="field"><label>Parcial 3</label><input id="f-p3" type="number" step="0.01" min="0" max="10" value="${item?.parcial3 || ''}" /></div>`;
  } else if (type === "car") {
    title.textContent = item ? "Editar Carrera" : "Nueva Carrera";
    body.innerHTML = `
      <div class="field"><label>Nombre</label><input id="f-nombre" value="${item?.nombre || ''}" /></div>
      <div class="field"><label>Descripción</label><input id="f-desc" value="${item?.descripcion || ''}" /></div>`;
  }
  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal() { document.getElementById("modal-overlay").classList.remove("open"); }
function closeModalOutside(e) { if (e.target === document.getElementById("modal-overlay")) closeModal(); }

async function saveModal() {
  try {
    if (modalType === "est") {
      const body = {
        nombre: document.getElementById("f-nombre").value,
        correo: document.getElementById("f-correo").value,
        carrera_id: parseInt(document.getElementById("f-carrera").value),
      };
      if (!editId) body.contrasena = document.getElementById("f-pass").value;
      editId ? await api(`/estudiantes/${editId}`, "PUT", body) : await api("/estudiantes/", "POST", body);
      loadEstudiantes();

    } else if (modalType === "mat") {
      const body = { nombre: document.getElementById("f-nombre").value, descripcion: document.getElementById("f-desc").value };
      editId ? await api(`/materias/${editId}`, "PUT", body) : await api("/materias/", "POST", body);
      loadMaterias();

    } else if (modalType === "cal") {
      const body = {
        parcial1: parseFloat(document.getElementById("f-p1").value),
        parcial2: parseFloat(document.getElementById("f-p2").value),
        parcial3: parseFloat(document.getElementById("f-p3").value),
      };
      if (!editId) body.inscripcion_id = parseInt(document.getElementById("f-inscripcion").value);
      editId ? await api(`/calificaciones/${editId}`, "PUT", body) : await api("/calificaciones/", "POST", body);
      loadCalificaciones();

    } else if (modalType === "car") {
      const body = { nombre: document.getElementById("f-nombre").value, descripcion: document.getElementById("f-desc").value };
      editId ? await api(`/carreras/${editId}`, "PUT", body) : await api("/carreras/", "POST", body);
      loadCarreras();
    }
    toast("Guardado correctamente ✓");
    closeModal();
  } catch(e) { toast(e.message, "err"); }
}
</script>
</body>
</html>
